<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prorib | Deniz Araçları ve Ekipmanları</title>
    <link rel="icon" type="image/png" href="logo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loader" class="loader-wrapper">
        <img src="logo.jpg" alt="Prorib Logo" class="loader-logo">
    </div>

    <nav class="navbar" id="mainNav">
        <div class="nav-left">
            <img src="logo.jpg" alt="Prorib Logo" class="brand-icon">
            <div class="brand-name">PRO<span>RIB</span></div>
        </div>
        <div class="nav-right">
            <a href="https://wa.me/905336332452" target="_blank" class="nav-cta">WHATSAPP DESTEK</a>
        </div>
    </nav>

    <header class="hero-slider">
        <div class="slider-track" id="heroTrack"></div>
        <div class="hero-overlay">
            <div class="hero-glass-card">
                <span class="tagline">NORTHSTAR</span>
                <h1>PROFESYONEL<strong> EKİPMAN</strong></h1>
                
            </div>
        </div>
    </header>

    <section class="sticky-filter">
        <div class="filter-container" id="categoryMenu"></div>
    </section>

    <main class="main-container">
        <div class="productGrid" id="productGrid"></div>
    </main>

    <div id="productModal" class="modal-overlay">
        <div class="modal-window">
            <button class="close-modal-btn" onclick="closeProduct()">&times;</button>
            <div id="modalContent" class="modal-content-grid"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
